<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Satunnaisen ehto Aliakseen</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div id="loader" class="drum-animation"><span>No...</span> <span>NiiN...</span></div>
        <img id="img" src="" alt="teeman kuva">
        <div id="themeDisplay"></div>
        <button id="btn">Satunnainen ehto</button> <!-- Кнопка теперь последняя -->
    </div>
    <script>
        const themes = [
            "pantomiimi", "pantomiimi", "pantomiimi",
            "piirtäminen", "piirtäminen", "piirtäminen",
            "espanja",
            "ilman verbejä",
            "ilman substantiiveja",
            "vastakohdan kautta",
            "kaksi ehtoa",
            "elokuva",
            "perusvaihtoehto", 
            "vapaavalintainen"];

        const themeImages = {
            "pantomiimi": "https://images.meme-arsenal.com/f015968d1cd2af0f67b3504e0bc95358.jpg",
            "piirtäminen": "https://static.boredpanda.com/blog/wp-content/uploads/2019/09/guy-draws-his-dog-badly-doodles-jay-cartner-7-5d70b3c5d5a64__700.jpg",
            "espanja": "https://i.imgflip.com/698jki.jpg",
            "ilman verbejä": "pictures/no_verbs.jpg",
            "ilman substantiiveja": "pictures/no_nouns.jpg",
            "vastakohdan kautta": "pictures/opposite.png",
            "kaksi ehtoa": "pictures/2_options.jpg",
            "elokuva": "pictures/movies_rock.jpg",
            "perusvaihtoehto": "pictures/basic.jpg",
            "vapaavalintainen": "pictures/freeoption.png"
        };

        const themeSounds = {
            "pantomiimi": "",
            "piirtäminen": "https://static.wikia.nocookie.net/soundeffects/images/3/3b/Unknown_Crayon_Drawing_Sound.ogg/revision/latest?cb=20231030180148",
            "espanja": "",
            "ilman verbejä": "",
            "ilman substantiiveja": "",
            "vastakohdan kautta": "",
            "kaksi ehtoa": "https://static.wikia.nocookie.net/soundeffects/images/0/07/Bruh_Sound_Effect.ogg/revision/latest?cb=20240412094905",
            "elokuva": "https://static.wikia.nocookie.net/soundeffects/images/a/a9/Wilhelm_Scream_1.ogg/revision/latest?cb=20191210223727",
            "perusvaihtoehto": "",
            "vapaavalintainen": ""
        };

        const btn = document.getElementById("btn");
        const themeDisplay = document.getElementById("themeDisplay");
        const themeImage = document.getElementById("img");
        const loader = document.getElementById("loader");
        
        // Общий звук клика
        const clickSound = new Audio("https://static.wikia.nocookie.net/soundeffects/images/3/3c/Sound_Ideas%2C_CARTOON%2C_ACCENT_-_ZIP%2C_BONKS%2C_POPS.ogg/revision/latest?cb=20171202125231");
        const drumRoll = new Audio("https://static.wikia.nocookie.net/soundeffects/images/f/f1/Hollywoodedge%2C_Snare_Drum_Roll_End_CRT042801.ogg/revision/latest?cb=20200517111758");

        const randomizeTheme = () => {
            btn.disabled = true;
            btn.style.opacity = "0.7";
            
            themeDisplay.textContent = "";
            themeImage.style.display = "none";
            loader.style.display = "block"; 

            drumRoll.currentTime = 3;
            drumRoll.play();

            setTimeout(() => {
                loader.style.display = "none";

                const nyt = document.createElement('div');
                nyt.className = 'flash-now';
                nyt.textContent = 'NYT!';
                document.querySelector('.container').appendChild(nyt);

                if (navigator.vibrate) navigator.vibrate(100);

                setTimeout(() => {
                    nyt.remove(); 
                    
                    const randomIndex = Math.floor(Math.random() * themes.length);
                    const randomTheme = themes[randomIndex];

                    // TÄMÄ RIVI PUUTTUI: asetetaan teksti näkyviin
                    themeDisplay.textContent = randomTheme;

                const imageUrl = themeImages[randomTheme];
                const isLandscape = window.innerHeight < 500 && window.innerWidth > window.innerHeight;

                if (imageUrl && imageUrl !== "") {
                    themeImage.src = imageUrl;
                    themeImage.style.display = "block";
                    // Убираем все marginTop, которые мы добавляли вручную
                    themeDisplay.style.marginTop = isLandscape ? "0" : "20px";
                } else {
                    themeImage.style.display = "none";
                    themeDisplay.style.marginTop = "0";
                }

                    const soundUrl = themeSounds[randomTheme];
                    if (soundUrl) {
                        const themeAudio = new Audio(soundUrl);
                        themeAudio.play();
                    }

                    btn.disabled = false;
                    btn.style.opacity = "1";
                }, 400); 

            }, 2500); 
        };

        btn.addEventListener("click", randomizeTheme);
    </script>
</body>
</html>
